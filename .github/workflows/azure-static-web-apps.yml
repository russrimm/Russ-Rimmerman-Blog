name: Azure Static Web Apps CI/CD

# Deploys via Microsoft Entra ID (OIDC) instead of a deployment token. Requires
# the AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID secrets and a
# one-time identity + RBAC setup. See "Deploying to Azure Static Web Apps" in
# README.md — it includes a ready-to-paste prompt so a coding agent can run the
# setup CLI for you.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Authenticate to Microsoft Entra ID via OIDC (no deployment token / access keys).
      # Requires an app registration or user-assigned managed identity with a
      # federated credential for this repo and a role assignment (e.g. Website
      # Contributor) on the Static Web App resource.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The static-web-apps-deploy action still requires a deployment token; it
      # can't authenticate with the OIDC login alone. Fetch a fresh token at
      # runtime via the RBAC-authorized identity so nothing long-lived is stored
      # as a repo secret.
      - name: Get deployment token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group "$SWA_RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          SWA_NAME: russrimmerman-blog
          SWA_RESOURCE_GROUP: russrimmerman-blog-rg

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Pre-built by the Build step above; skip_app_build makes the action
          # deploy app_location as-is (output_location is ignored when skipping
          # the build), so point app_location at the build output.
          app_location: "dist"
          api_location: "api"
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployment token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group "$SWA_RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          SWA_NAME: russrimmerman-blog
          SWA_RESOURCE_GROUP: russrimmerman-blog-rg

      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: close
