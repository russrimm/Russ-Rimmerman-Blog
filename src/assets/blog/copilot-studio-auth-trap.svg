<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Copilot Studio SSO and Direct Line routing motif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f1b2e"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientTransform="translate(300 180) rotate(35) scale(360 260)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientTransform="translate(980 470) rotate(-20) scale(320 240)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1c2b44" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Chat window: EnvironmentSettingViolation -->
  <g transform="translate(150 130)">
    <rect x="0" y="0" width="560" height="330" rx="18" fill="#0d1626" stroke="#22344f" stroke-width="1.5"/>
    <rect x="0" y="0" width="560" height="48" rx="18" fill="#101d31"/>
    <rect x="0" y="30" width="560" height="18" fill="#101d31"/>
    <circle cx="28" cy="24" r="6" fill="#f87171"/>
    <circle cx="50" cy="24" r="6" fill="#fbbf24"/>
    <circle cx="72" cy="24" r="6" fill="#34d399"/>
    <text x="100" y="29" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#5b7196">copilot-studio · agent</text>

    <!-- user bubble -->
    <rect x="300" y="76" width="230" height="46" rx="14" fill="#1e2a44"/>
    <text x="320" y="104" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#c7d3e6">Sign me in…</text>

    <!-- bot error bubble -->
    <rect x="28" y="140" width="380" height="120" rx="14" fill="#2a1420" stroke="#7f1d1d" stroke-width="1.5"/>
    <text font-family="ui-sans-serif, system-ui, sans-serif" xml:space="preserve">
      <tspan x="48" y="172" font-size="15" fill="#fca5a5">Sorry, something unexpected happened.</tspan>
      <tspan x="48" y="200" font-size="14" fill="#f87171" font-family="ui-monospace, monospace">Error code:</tspan>
      <tspan x="48" y="226" font-size="16" fill="#fecaca" font-family="ui-monospace, monospace" font-weight="700">EnvironmentSettingViolation</tspan>
    </text>
    <text x="28" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#5b7196"># SSO on → SDK can't token-exchange</text>
  </g>

  <!-- BFF routing: Browser → Server → Direct Line -->
  <g transform="translate(760 170)" font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="300" height="66" rx="14" fill="#0d1626" stroke="url(#accent)" stroke-width="2"/>
    <text x="24" y="32" font-size="16" fill="#c7d3e6" font-weight="600">Browser</text>
    <text x="24" y="52" font-size="12" fill="#5b7196">no token, ever</text>

    <line x1="150" y1="66" x2="150" y2="104" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="0" y="112" width="300" height="66" rx="14" fill="#0d1626" stroke="#8b5cf6" stroke-width="2"/>
    <text x="24" y="144" font-size="16" fill="#c7d3e6" font-weight="600">/api/…/chat</text>
    <text x="24" y="164" font-size="12" fill="#5b7196">server-side (BFF)</text>

    <line x1="150" y1="178" x2="150" y2="216" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="0" y="224" width="300" height="66" rx="14" fill="#0d1626" stroke="#2dd4bf" stroke-width="2"/>
    <text x="24" y="256" font-size="16" fill="#c7d3e6" font-weight="600">Direct Line</text>
    <text x="24" y="276" font-size="12" fill="#5b7196">token exchange ✓</text>
  </g>
</svg>
